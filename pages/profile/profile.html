<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Orbit</title>
  <link rel="stylesheet" href="../../shared/shared.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="profile-page">
    <p id="profile-guest" class="profile-guest hidden">
      You are not logged in.
      <a href="../login/login.html">Log in</a> or
      <a href="../register/register.html">register</a>.
    </p>

    <section id="profile-panel" class="profile-panel hidden">
      <div class="profile-header-row">
        <h1 id="profile-username">username</h1>
        <button id="editProfileBtn" type="button" class="btn btn-edit">
          Edit Profile
        </button>
      </div>

      <p id="profile-email" class="profile-email"></p>
      <p id="profile-bio" class="profile-bio"></p>

      <div class="profile-stats">
        <span id="stat-following">Following: 0</span>
        <span id="stat-followers">Followers: 0</span>
        <span id="stat-posts">Posts: 0</span>
      </div>

      <div
        id="editProfileTab"
        class="edit-tab hidden"
        role="dialog"
        aria-modal="false"
        aria-labelledby="editProfileTitle"
      >
        <div class="edit-tab-header">
          <h3 id="editProfileTitle">Edit Profile</h3>
          <button
            id="cancelEditBtn"
            type="button"
            class="icon-btn"
            aria-label="Close"
          >
            ×
          </button>
        </div>

        <form id="editProfileForm" class="edit-form">
          <label for="edit-username" class="edit-label">Username</label>
          <input
            id="edit-username"
            type="text"
            class="edit-input"
            autocomplete="off"
          />

          <label for="edit-email" class="edit-label">Email</label>
          <input
            id="edit-email"
            type="email"
            class="edit-input edit-input-disabled"
            disabled
          />

          <label for="edit-bio" class="edit-label">Bio</label>
          <textarea
            id="edit-bio"
            class="edit-textarea"
            rows="4"
          ></textarea>

          <div class="edit-form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <button
              id="cancelEditBtn2"
              type="button"
              class="btn btn-secondary"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>

      <h2>Your posts</h2>
      <ul id="profile-posts-list" class="profile-posts-list"></ul>
    </section>
  </main>

  <script src="../../shared/storage.js"></script>
  <script src="profile.js"></script>
</body>
</html>
