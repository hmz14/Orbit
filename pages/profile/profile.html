<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile – Orbit</title>
  <link rel="stylesheet" href="../../shared/shared.css">
  <link rel="stylesheet" href="profile.css">
  <link rel="stylesheet" href="../post/post.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="top-nav">
    <div class="brand-wrap">
      <img class="brand-logo" src="../../assets/icons/orbit_logo.png" alt="Orbit">
    </div>

    <nav class="top-links" aria-label="Primary navigation">
      <a class="top-link" href="../feed/feed.html">Feed</a>
      <a class="top-link top-link-active" href="../profile/profile.html">Profile</a>
      <img id="nav-avatar" class="nav-avatar hidden" src="../../assets/images/profile.svg" alt="">
      <button id="logoutBtn" type="button" class="top-link top-link-logout">Logout</button>
    </nav>
  </header>

  <main class="profile-page">
    <p id="profile-guest" class="profile-guest hidden">
      You are not logged in.
      <a href="../login/login.html">Log in</a> or
      <a href="../register/register.html">register</a>.
    </p>

    <div id="profile-panel" class="profile-panel hidden">
      <section class="profile-hero-card">
        <div class="profile-cover" aria-hidden="true"></div>
        <div class="profile-hero-body">
          <img
            id="profile-hero-avatar"
            class="profile-hero-avatar"
            src="../../assets/images/profile.svg"
            alt="Profile photo"
          >
          <div class="profile-hero-info">
            <div class="profile-hero-row">
              <div class="profile-name-block">
                <h1 id="profile-username" class="profile-display-name">username</h1>
                <p id="profile-handle" class="profile-handle">@username</p>
              </div>
              <button id="editProfileBtn" type="button" class="btn btn-secondary profile-edit-btn">
                Edit Profile
              </button>
              <button id="followProfileBtn" type="button" class="btn btn-primary profile-follow-btn hidden">
                Follow
              </button>
            </div>
            <p id="profile-email" class="profile-email-small"></p>
            <p id="profile-bio" class="profile-bio-hero"></p>
            <div class="profile-stats-row">
              <button id="stat-following" class="profile-stat profile-stat-btn">Following 0</button>
              <button id="stat-followers" class="profile-stat profile-stat-btn">Followers 0</button>
              <span id="stat-posts" class="profile-stat">Posts 0</span>
            </div>
          </div>
        </div>
      </section>

     
      <div class="profile-content-row">

       
        <section id="profile-create-post" class="profile-create-post hidden">
          <form id="profileCreatePostForm" class="pcp-form">
            <div class="pcp-top">
              <img id="pcp-avatar" class="pcp-avatar" src="../../assets/images/profile.svg" alt="">
              <textarea id="profilePostText" class="pcp-textarea" rows="3" placeholder="What's on your mind?"></textarea>
            </div>
            <div class="pcp-bottom">
              <label for="profilePostImages" class="pcp-img-label">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                Add Photo
                <input type="file" id="profilePostImages" accept="image/*" multiple class="pcp-img-input">
              </label>
              <div id="pcp-previews" class="pcp-previews"></div>
              <button type="submit" class="btn btn-primary pcp-submit">Post</button>
            </div>
          </form>
        </section>

        <section class="profile-posts-block">
          <h2 id="profile-posts-title" class="profile-posts-title">Your posts</h2>
          <ul id="profile-posts-list" class="orbit-posts-list profile-posts-feed"></ul>
        </section>

      </div>

      <div
        id="editProfileTab"
        class="edit-tab hidden"
        role="dialog"
        aria-modal="false"
        aria-labelledby="editProfileTitle"
      >
        <div class="edit-tab-header">
          <h3 id="editProfileTitle">Edit Profile</h3>
          <button
            id="cancelEditBtn"
            type="button"
            class="icon-btn"
            aria-label="Close"
          >
            ×
          </button>
        </div>

        <form id="editProfileForm" class="edit-form">
         
          <div class="edit-avatar-wrap">
            <img id="edit-avatar-preview" class="edit-avatar-preview" src="../../assets/images/profile.svg" alt="Preview">
            <label for="edit-avatar-input" class="edit-avatar-label">
              Change Photo
              <input type="file" id="edit-avatar-input" accept="image/*" class="edit-avatar-input">
            </label>
          </div>

          <label for="edit-username" class="edit-label">Username</label>
          <input
            id="edit-username"
            type="text"
            class="edit-input"
            autocomplete="off"
          />

          <label for="edit-email" class="edit-label">Email</label>
          <input
            id="edit-email"
            type="email"
            class="edit-input edit-input-disabled"
            disabled
          />

          <label for="edit-bio" class="edit-label">Bio</label>
          <textarea
            id="edit-bio"
            class="edit-textarea"
            rows="4"
          ></textarea>

          <div class="edit-form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <button
              id="cancelEditBtn2"
              type="button"
              class="btn btn-secondary"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>
    
    <div id="usersModal" class="users-modal hidden" role="dialog" aria-modal="true" aria-labelledby="usersModalTitle">
      <div class="users-modal-card">
        <div class="users-modal-header">
          <h3 id="usersModalTitle" class="users-modal-title">Following</h3>
          <button id="usersModalClose" class="icon-btn" aria-label="Close">×</button>
        </div>
        <ul id="usersModalList" class="users-modal-list"></ul>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <nav class="site-footer-nav">
        <a class="site-footer-link" href="../feed/feed.html">Home</a>
        <a class="site-footer-link" href="../profile/profile.html">Profile</a>
      </nav>
      <span class="site-footer-copy">© 2026 Orbit. All rights reserved.</span>
    </div>
  </footer>

  <script src="../../data/seed.js"></script>
  <script src="../../shared/storage.js"></script>
  <script src="../post/post.js"></script>
  <script src="profile.js"></script>
</body>
</html>
