<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="../../shared/shared.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <img class="brand-logo" src="../../assets/icons/orbit_logo.png" alt="Orbit">
  <p>
    Stay in your circle
  </p>
  <div class="login-form">
    <h2>Login</h2>
    <form id="login-form">
      <input type="text" id="login-username" placeholder="Username" required autocomplete="username">
      <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
      <button type="submit">Login</button>
    </form>
    <p id="login-feedback" class="login-feedback" aria-live="polite"></p>
    <p>
      Don't have an account? <a href="../register/register.html">Register</a>
    </p>
  </div>

  <script src="../../data/seed.js"></script>
  <script src="../../shared/storage.js"></script>
  <script src="login.js"></script>
</body>
</html>
